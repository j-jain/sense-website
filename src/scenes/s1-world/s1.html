<!-- ══════════════════════════════════════════
     S1 — THE WORLD (forma-frame hero)
══════════════════════════════════════════ -->
<section id="s1">

  <!-- ── Boot sequence ─────────────────────── -->
  <div class="s1-boot" id="s1-boot">
    <div class="s1-boot-inner">
      <div class="boot-line" id="bl-1"><span class="bl-dim">&gt;</span> sense v4.2.1</div>
      <div class="boot-line" id="bl-2"><span class="bl-dim">&gt;</span> Initializing diagnostic engine<span class="bl-dim">...</span> <span class="bl-ok">OK</span></div>
      <div class="boot-line" id="bl-3"><span class="bl-dim">&gt;</span> Fleet network <span class="bl-dim">[NH-44 corridor]</span><span class="bl-dim">...</span> <span class="bl-ok">CONNECTED</span></div>
      <div class="boot-line" id="bl-4"><span class="bl-dim">&gt;</span> Vehicle telemetry<span class="bl-dim">...</span> <span class="bl-ok">ACTIVE</span></div>
      <div class="boot-line" id="bl-5"><span class="bl-dim">&gt;</span> Camera feed<span class="bl-dim">...</span> <span class="bl-ok">LIVE</span></div>
      <div class="boot-line" id="bl-6"><span class="bl-red">■</span> SYSTEM READY<span class="boot-cursor"></span></div>
    </div>
  </div>

  <!-- ── Forma frame stage (video clipped to the tabbed shape + white outline) ── -->
  <div class="s1-cinema" id="s1-cinema">
    <svg id="s1-frame-svg" viewBox="0 0 1440 675" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="s1FormaClip">
          <path d="M 56 16 L 570 16 C 620 16 620 102 720 102 C 820 102 820 16 870 16 L 1384 16 A 40 40 0 0 1 1424 56 L 1424 619 A 40 40 0 0 1 1384 659 L 870 659 C 820 659 820 573 720 573 C 620 573 620 659 570 659 L 56 659 A 40 40 0 0 1 16 619 L 16 56 A 40 40 0 0 1 56 16 Z"/>
        </clipPath>
      </defs>
      <foreignObject x="0" y="0" width="1440" height="675" clip-path="url(#s1FormaClip)">
        <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%">
          <video id="s1-video" class="s1-vid" muted playsinline preload="auto" poster="/s1-hero-poster.jpg">
            <source src="https://densosensemedia.blob.core.windows.net/media/Truck_yard_blue_hour_highway_202605201710.mp4" type="video/mp4">
          </video>
        </div>
      </foreignObject>
      <path class="s1-frame-stroke"
            d="M 56 16 L 570 16 C 620 16 620 102 720 102 C 820 102 820 16 870 16 L 1384 16 A 40 40 0 0 1 1424 56 L 1424 619 A 40 40 0 0 1 1384 659 L 870 659 C 820 659 820 573 720 573 C 620 573 620 659 570 659 L 56 659 A 40 40 0 0 1 16 619 L 16 56 A 40 40 0 0 1 56 16 Z"
            fill="none" stroke="rgba(242,240,235,0.9)" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
    </svg>

    <!-- overlay UI, positioned over the framed video -->
    <div class="s1-ov">
      <div class="s1-scrim"></div>

      <!-- logo in the top tab -->
      <div class="s1-logo"><span class="mk">■</span> sense</div>
      <!-- demo CTA top-right -->
      <a class="s1-demopill nav-demo" href="#s8">Request a Demo</a>

      <!-- headline + CTA, left -->
      <div class="s1-headline-wrap" id="s1-headline-wrap">
        <div class="s1-eyebrow">Commercial vehicle intelligence</div>
        <h1 id="s1-headline" class="f-display">Every journey begins<br>with a promise.</h1>
        <div class="s1-cta-wrap" id="s1-cta-wrap">
          <a id="start-btn" class="s1-btn" role="button" tabindex="0">Start Journey <span class="c">→</span></a>
        </div>
      </div>

      <!-- social bottom-left -->
      <div class="s1-social"><div>in</div><div>x</div><div>▶</div></div>
      <!-- scroll arrow in the bottom tab -->
      <div class="s1-arrow" id="s1-arrow" aria-hidden="true">↓</div>
    </div>
  </div>

</section>

<!-- Cinematic transition overlay -->
<div class="s1-transition" id="s1-transition"></div>
